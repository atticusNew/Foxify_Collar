version: "3.8"

services:
  broker-bridge:
    build:
      context: .
      dockerfile: services/broker-bridge/Dockerfile
    environment:
      - IBKR_BRIDGE_PORT=18080
      - IBKR_BRIDGE_HOST=0.0.0.0
      - IBKR_BRIDGE_REQUIRE_AUTH=${IBKR_BRIDGE_REQUIRE_AUTH:-false}
      - IBKR_BRIDGE_TOKEN=${IBKR_BRIDGE_TOKEN:-}
      - IBKR_BRIDGE_READONLY=${IBKR_BRIDGE_READONLY:-true}
      - IBKR_BRIDGE_TRANSPORT=${IBKR_BRIDGE_TRANSPORT:-synthetic}
      - IBKR_BRIDGE_FALLBACK_TO_SYNTHETIC=${IBKR_BRIDGE_FALLBACK_TO_SYNTHETIC:-true}
      - IBKR_GATEWAY_HOST=${IBKR_GATEWAY_HOST:-127.0.0.1}
      - IBKR_GATEWAY_PORT=${IBKR_GATEWAY_PORT:-4002}
      - IBKR_GATEWAY_CLIENT_ID=${IBKR_GATEWAY_CLIENT_ID:-101}
      - IBKR_GATEWAY_CONNECT_TIMEOUT_MS=${IBKR_GATEWAY_CONNECT_TIMEOUT_MS:-5000}
      - IBKR_GATEWAY_REQUEST_TIMEOUT_MS=${IBKR_GATEWAY_REQUEST_TIMEOUT_MS:-6000}
      - IBKR_MARKET_DATA_TYPE=${IBKR_MARKET_DATA_TYPE:-1}
    ports:
      - "${IBKR_BRIDGE_PORT:-18080}:18080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    restart: unless-stopped

  atticus:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - DERIBIT_ENV=testnet
      - DERIBIT_PAPER=true
      - DERIBIT_CLIENT_ID=${DERIBIT_CLIENT_ID}
      - DERIBIT_CLIENT_SECRET=${DERIBIT_CLIENT_SECRET}
      - PILOT_API_ENABLED=${PILOT_API_ENABLED:-true}
      - RISK_CONTROLS_PATH=/app/configs/risk_controls.json
      - AUDIT_LOG_PATH=/app/logs/audit.log
      - POSTGRES_URL=postgresql://atticus:${DB_PASSWORD}@postgres:5432/atticus
      - IBKR_BRIDGE_BASE_URL=http://broker-bridge:18080
      - IBKR_BRIDGE_TOKEN=${IBKR_BRIDGE_TOKEN}
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    depends_on:
      broker-bridge:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=atticus
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=atticus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atticus"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
