services:
  # DEPRECATED: broker-bridge is no longer needed for V7 pilot (Bullish venue only).
  # Kept in file for reference. Do not start this service.
  # broker-bridge:
  #   build:
  #     context: .
  #     dockerfile: services/broker-bridge/Dockerfile
  #   env_file:
  #     - .env
  #   environment:
  #     - IBKR_BRIDGE_PORT=18080
  #     - IBKR_BRIDGE_HOST=0.0.0.0
  #   ports:
  #     - "${IBKR_BRIDGE_PORT:-18080}:18080"
  #   restart: unless-stopped

  atticus:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - DERIBIT_ENV=${DERIBIT_ENV:-live}
      - DERIBIT_PAPER=${DERIBIT_PAPER:-true}
      - DERIBIT_CLIENT_ID=${DERIBIT_CLIENT_ID:-}
      - DERIBIT_CLIENT_SECRET=${DERIBIT_CLIENT_SECRET:-}
      - PILOT_API_ENABLED=${PILOT_API_ENABLED:-true}
      - RISK_CONTROLS_PATH=/app/configs/risk_controls.json
      - AUDIT_LOG_PATH=/app/logs/audit.log
      - POSTGRES_URL=postgresql://atticus:${DB_PASSWORD}@postgres:5432/atticus
      - V7_PRICING_ENABLED=${V7_PRICING_ENABLED:-true}
      - V7_DEFAULT_TENOR_DAYS=${V7_DEFAULT_TENOR_DAYS:-2}
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1));"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=atticus
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=atticus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atticus"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
